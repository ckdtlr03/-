<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="0">
    <title>디바이스 대여/반납 시스템</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
    <link rel="stylesheet" href="css/style.css?v=18">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
</head>
<body>
        <!-- 사이드바 오버레이 -->
        <div id="sidebarOverlay" class="sidebar-overlay"></div>

        <!-- 사이드바 -->
        <nav id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <button id="sidebarClose" class="sidebar-close">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <line x1="4" y1="4" x2="16" y2="16"/>
                        <line x1="16" y1="4" x2="4" y2="16"/>
                    </svg>
                </button>
            </div>
            <ul class="sidebar-menu">
                <li><button id="homeMenuBtn" class="sidebar-item">디바이스 관리</button></li>
                <li><button id="clearSavedBtn" class="sidebar-item">저장 정보 초기화</button></li>
                <li><a id="qrGenMenuBtn" class="sidebar-item" href="qr-generator.html">QR 생성기 (관리자)</a></li>
            </ul>
        </nav>

        <!-- 헤더 -->
        <header class="header">
            <button id="hamburgerBtn" class="hamburger-btn">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </header>
    <div class="container">

        <!-- 홈 화면 -->
        <div id="homeScreen" class="screen active">
            <div class="home-container">
                <div class="home-header">
                    <h1 class="home-title">디바이스 관리</h1>
                </div>
                <div class="home-actions">
                    <button id="enterRentalBtn" class="home-action-btn">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="4" width="18" height="16" rx="2"/>
                            <line x1="3" y1="10" x2="21" y2="10"/>
                            <path d="M8 15h3"/>
                        </svg>
                        <span>대여 및 반납</span>
                    </button>
                    <button id="enterScanBtn" class="home-action-btn">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 7V5a2 2 0 0 1 2-2h2"/>
                            <path d="M17 3h2a2 2 0 0 1 2 2v2"/>
                            <path d="M21 17v2a2 2 0 0 1-2 2h-2"/>
                            <path d="M7 21H5a2 2 0 0 1-2-2v-2"/>
                            <rect x="7" y="7" width="10" height="10" rx="1"/>
                        </svg>
                        <span>QR 인식</span>
                    </button>
                </div>

                <!-- A안: 홈 대시보드 — 현재 대여 중 -->
                <section class="home-dashboard">
                    <div class="home-dashboard-header">
                        <span class="home-dashboard-title">현재 대여 중</span>
                        <span id="homeRentedCount" class="dashboard-count">0</span>
                        <button id="refreshHomeDashBtn" class="dashboard-refresh" aria-label="새로고침">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="23 4 23 10 17 10"/>
                                <polyline points="1 20 1 14 7 14"/>
                                <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
                            </svg>
                        </button>
                    </div>
                    <div id="homeRentedList" class="home-rented-grid">
                        <div class="home-rented-empty">불러오는 중...</div>
                    </div>
                </section>
            </div>
        </div>

        <!-- 메인 화면 (디바이스 현황) -->
        <div id="mainScreen" class="screen">
            <div class="main-header">
                <button id="backToHomeBtn" class="icon-btn icon-btn-back" aria-label="홈으로">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6"/>
                    </svg>
                </button>
                <h1 class="main-title">디바이스 현황</h1>
                <div class="main-header-actions">
                    <button id="selectModeBtn" class="icon-btn" aria-label="다중 선택" title="다중 선택">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="18" height="18" rx="3"/>
                            <polyline points="8 12 11 15 16 9"/>
                        </svg>
                    </button>
                    <button id="refreshMainBtn" class="refresh-btn" aria-label="새로고침">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="23 4 23 10 17 10"/>
                            <polyline points="1 20 1 14 7 14"/>
                            <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="search-bar">
                <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <input id="searchInput" type="text" placeholder="디바이스 이름 검색" autocomplete="off">
                <button id="searchClearBtn" class="search-clear" aria-label="검색어 지우기">
                    <svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <line x1="4" y1="4" x2="16" y2="16"/>
                        <line x1="16" y1="4" x2="4" y2="16"/>
                    </svg>
                </button>
            </div>
            <div id="mainDeviceList" class="device-list-main">
                <div class="status-loading">불러오는 중...</div>
            </div>
            <div id="selectionBar" class="selection-bar">
                <div class="selection-info"><span id="selectedCount">0</span>개 선택됨</div>
                <div class="selection-actions">
                    <button id="bulkRentBtn" class="primary-btn sm">대여 <span id="bulkRentCount">0</span></button>
                    <button id="bulkReturnBtn" class="secondary-btn sm">반납 <span id="bulkReturnCount">0</span></button>
                </div>
            </div>
        </div>

        <!-- QR 스캔 화면 -->
        <div id="qrScanScreen" class="screen">
            <div class="main-header">
                <button id="backFromScanBtn" class="icon-btn icon-btn-back" aria-label="홈으로">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6"/>
                    </svg>
                </button>
                <h1 class="main-title">QR 인식</h1>
                <div class="main-header-actions"></div>
            </div>
            <div class="qr-scan-body">
                <div class="qr-video-wrap">
                    <video id="qrVideo" playsinline muted autoplay></video>
                    <div class="qr-scan-frame"></div>
                </div>
                <p id="qrScanStatus" class="qr-scan-status">QR을 화면 중앙에 맞추면 자동 인식됩니다.</p>
            </div>
        </div>

        <!-- 디바이스 액션 모달 -->
        <div id="deviceActionModal" class="modal-overlay">
            <div class="modal-container modal-small">
                <div class="modal-header">
                    <h2 id="deviceActionTitle">디바이스</h2>
                    <button id="closeDeviceActionModal" class="modal-close">
                        <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                            <line x1="4" y1="4" x2="16" y2="16"/>
                            <line x1="16" y1="4" x2="4" y2="16"/>
                        </svg>
                    </button>
                </div>
                <div class="modal-body">
                    <div id="deviceActionInfo" class="device-action-info"></div>
                    <div id="deviceActionButtons" class="device-action-buttons"></div>
                </div>
            </div>
        </div>

        <!-- 대여 정보 입력 모달 (현황에서 대여 시) -->
        <div id="rentFromStatusModal" class="modal-overlay">
            <div class="modal-container modal-small">
                <div class="modal-header">
                    <h2>대여 정보 입력</h2>
                    <button id="closeRentFromStatusModal" class="modal-close">
                        <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                            <line x1="4" y1="4" x2="16" y2="16"/>
                            <line x1="16" y1="4" x2="4" y2="16"/>
                        </svg>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label for="modalRenterName">이름</label>
                        <input type="text" id="modalRenterName" placeholder="이름을 입력하세요" autocomplete="off">
                    </div>
                    <label class="remember-name-option" for="rememberNameCheck">
                        <input type="checkbox" id="rememberNameCheck">
                        <span>다음부터 이름·셀 묻지 않고 바로 진행</span>
                    </label>
                    <div class="cell-rent-buttons">
                        <button id="rentCell1Btn" class="primary-btn">1셀 대여</button>
                        <button id="rentCell2Btn" class="primary-btn">2셀 대여</button>
                    </div>
                    <button id="cancelRentFromStatus" class="secondary-btn cancel-full">취소</button>
                </div>
            </div>
        </div>

        <!-- 로딩 오버레이 -->
        <div id="loadingOverlay" class="loading-overlay">
            <div class="loading-spinner"></div>
            <p>처리 중...</p>
        </div>
    </div>

    <!-- B안: PC 우측 고정 패널 — 현재 대여 중 -->
    <aside id="pcRentPanel" class="pc-rent-panel">
        <div class="pc-rent-panel-header">
            <span>현재 대여 중</span>
            <span id="pcRentedCount" class="dashboard-count">0</span>
        </div>
        <div id="pcRentedList" class="pc-rented-list">
            <div class="home-rented-empty">불러오는 중...</div>
        </div>
    </aside>

    <script src="js/config.js?v=18"></script>
    <script src="js/app.js?v=18"></script>
</body>
</html>
