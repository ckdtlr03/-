<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>디바이스 대여/반납 시스템</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <!-- QR 코드 생성 라이브러리 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
        <!-- 사이드바 오버레이 -->
        <div id="sidebarOverlay" class="sidebar-overlay"></div>

        <!-- 사이드바 -->
        <nav id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <button id="sidebarClose" class="sidebar-close">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <line x1="4" y1="4" x2="16" y2="16"/>
                        <line x1="16" y1="4" x2="4" y2="16"/>
                    </svg>
                </button>
            </div>
            <ul class="sidebar-menu">
                <li><button id="homeMenuBtn" class="sidebar-item">디바이스 관리</button></li>
            </ul>
        </nav>

        <!-- 헤더 -->
        <header class="header">
            <button id="hamburgerBtn" class="hamburger-btn">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </header>
    <div class="container">

        <!-- 홈 화면 -->
        <div id="homeScreen" class="screen active">
            <div class="home-container">
                <div class="home-header">
                    <h1 class="home-title">디바이스 관리</h1>
                </div>
                <div class="home-actions">
                    <button id="enterRentalBtn" class="home-action-btn">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="4" width="18" height="16" rx="2"/>
                            <line x1="3" y1="10" x2="21" y2="10"/>
                            <path d="M8 15h3"/>
                        </svg>
                        <span>대여 및 반납</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- 메인 화면 (디바이스 현황) -->
        <div id="mainScreen" class="screen">
            <div class="main-header">
                <button id="backToHomeBtn" class="icon-btn icon-btn-back" aria-label="홈으로">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6"/>
                    </svg>
                </button>
                <h1 class="main-title">디바이스 현황</h1>
                <div class="main-header-actions">
                    <button id="selectModeBtn" class="icon-btn" aria-label="다중 선택" title="다중 선택">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="18" height="18" rx="3"/>
                            <polyline points="8 12 11 15 16 9"/>
                        </svg>
                    </button>
                    <button id="refreshMainBtn" class="refresh-btn" aria-label="새로고침">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="23 4 23 10 17 10"/>
                            <polyline points="1 20 1 14 7 14"/>
                            <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="search-bar">
                <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <input id="searchInput" type="text" placeholder="디바이스 이름 검색" autocomplete="off">
                <button id="searchClearBtn" class="search-clear" aria-label="검색어 지우기">
                    <svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <line x1="4" y1="4" x2="16" y2="16"/>
                        <line x1="16" y1="4" x2="4" y2="16"/>
                    </svg>
                </button>
            </div>
            <div id="mainDeviceList" class="device-list-main">
                <div class="status-loading">불러오는 중...</div>
            </div>
            <div id="selectionBar" class="selection-bar">
                <div class="selection-info"><span id="selectedCount">0</span>개 선택됨</div>
                <div class="selection-actions">
                    <button id="bulkRentBtn" class="primary-btn sm">대여 <span id="bulkRentCount">0</span></button>
                    <button id="bulkReturnBtn" class="secondary-btn sm">반납 <span id="bulkReturnCount">0</span></button>
                </div>
            </div>
        </div>

        <!-- QR 생성 화면 -->
        <div id="qrGeneratorScreen" class="screen">
            <div class="form-container">
                <h2>QR 코드 생성</h2>

                <!-- 탭 선택 -->
                <div class="tab-selector">
                    <button id="tabSingle" class="tab-btn active">단일 생성</button>
                    <button id="tabBatch" class="tab-btn">일괄 생성</button>
                </div>

                <!-- 단일 생성 -->
                <div id="singleGenSection" class="gen-section active">
                    <div class="form-group">
                        <label for="genDeviceId">디바이스 ID</label>
                        <input type="text" id="genDeviceId" placeholder="예: DEV001">
                    </div>

                    <div class="form-group">
                        <label for="genDeviceName">디바이스 이름 (선택)</label>
                        <input type="text" id="genDeviceName" placeholder="예: iPhone 15 Pro">
                    </div>

                    <div class="button-row">
                        <button id="backFromGenerator" class="secondary-btn">뒤로</button>
                        <button id="generateQrBtn" class="primary-btn">생성</button>
                    </div>

                    <div id="qrResultArea" class="qr-result-area">
                        <div id="qrCodeDisplay"></div>
                        <div class="qr-result-info">
                            <p><strong>ID:</strong> <span id="qrResultId"></span></p>
                            <p><strong>이름:</strong> <span id="qrResultName"></span></p>
                        </div>
                        <button id="downloadQrBtn" class="primary-btn">다운로드</button>
                    </div>
                </div>

                <!-- 일괄 생성 -->
                <div id="batchGenSection" class="gen-section">
                    <div class="form-group">
                        <label for="batchInput">디바이스 목록 (한 줄에 하나씩)</label>
                        <textarea id="batchInput" class="batch-textarea" placeholder="DEV001,iPhone 15 Pro
DEV002,Galaxy S24
DEV003,iPad Pro 12.9"></textarea>
                        <p class="help-text">형식: 디바이스ID,디바이스이름 (쉼표로 구분)</p>
                    </div>

                    <div class="button-row">
                        <button id="backFromBatch" class="secondary-btn">뒤로</button>
                        <button id="generateBatchBtn" class="primary-btn">일괄 생성</button>
                    </div>

                    <div id="batchResultArea" class="batch-results"></div>
                </div>
            </div>
        </div>

        <!-- 디바이스 액션 모달 -->
        <div id="deviceActionModal" class="modal-overlay">
            <div class="modal-container modal-small">
                <div class="modal-header">
                    <h2 id="deviceActionTitle">디바이스</h2>
                    <button id="closeDeviceActionModal" class="modal-close">
                        <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                            <line x1="4" y1="4" x2="16" y2="16"/>
                            <line x1="16" y1="4" x2="4" y2="16"/>
                        </svg>
                    </button>
                </div>
                <div class="modal-body">
                    <div id="deviceActionInfo" class="device-action-info"></div>
                    <div id="deviceActionButtons" class="device-action-buttons"></div>
                </div>
            </div>
        </div>

        <!-- 대여 정보 입력 모달 (현황에서 대여 시) -->
        <div id="rentFromStatusModal" class="modal-overlay">
            <div class="modal-container modal-small">
                <div class="modal-header">
                    <h2>대여 정보 입력</h2>
                    <button id="closeRentFromStatusModal" class="modal-close">
                        <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                            <line x1="4" y1="4" x2="16" y2="16"/>
                            <line x1="16" y1="4" x2="4" y2="16"/>
                        </svg>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label>셀 선택</label>
                        <div class="cell-selector">
                            <label class="cell-option">
                                <input type="radio" name="modalCell" value="1셀" checked>
                                <span class="cell-label">1셀</span>
                            </label>
                            <label class="cell-option">
                                <input type="radio" name="modalCell" value="2셀">
                                <span class="cell-label">2셀</span>
                            </label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="modalRenterName">이름</label>
                        <input type="text" id="modalRenterName" placeholder="이름을 입력하세요" autocomplete="off">
                    </div>
                    <div class="button-row" style="margin-top:24px;">
                        <button id="cancelRentFromStatus" class="secondary-btn">취소</button>
                        <button id="confirmRentFromStatus" class="primary-btn" style="background:#fff;color:#111;border-color:#fff;">대여 확인</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 관리자 비밀번호 모달 -->
        <div id="adminPasswordModal" class="modal-overlay">
            <div class="modal-container modal-small">
                <div class="modal-header">
                    <h2>관리자 인증</h2>
                    <button id="closeAdminPasswordModal" class="modal-close">
                        <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                            <line x1="4" y1="4" x2="16" y2="16"/>
                            <line x1="16" y1="4" x2="4" y2="16"/>
                        </svg>
                    </button>
                </div>
                <div class="modal-body">
                    <p class="admin-desc">QR 코드 생성은 관리자만 사용할 수 있습니다.</p>
                    <div class="form-group">
                        <label for="adminPassword">비밀번호</label>
                        <input type="password" id="adminPassword" placeholder="비밀번호를 입력하세요" autocomplete="off">
                    </div>
                    <p id="adminPasswordError" class="admin-error"></p>
                    <div class="button-row" style="margin-top:24px;">
                        <button id="cancelAdminPassword" class="secondary-btn">취소</button>
                        <button id="confirmAdminPassword" class="primary-btn" style="background:#fff;color:#111;border-color:#fff;">확인</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 로딩 오버레이 -->
        <div id="loadingOverlay" class="loading-overlay">
            <div class="loading-spinner"></div>
            <p>처리 중...</p>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
